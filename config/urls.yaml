version: 1

# ---------------------------------------------------------------------------
# Auth sessions — executed in order after the guest pass.
# Login happens once per session; all URLs tagged for that stream are checked.
# class_ matches the UI pill text on allen.in/profile (e.g. "11th", "8th").
# board is only required for Class 6-10 (CBSE by default).
# ---------------------------------------------------------------------------
auth_sessions:
  # JEE
  - stream: JEE
    class: "11th"
  - stream: JEE
    class: "12th"
  - stream: JEE
    class: "12th Plus"

  # NEET
  - stream: NEET
    class: "11th"
  - stream: NEET
    class: "12th"
  - stream: NEET
    class: "12th Plus"

  # Class 6-10 (board: CBSE)
  - stream: "Class 6-10"
    class: "6th"
    board: CBSE
  - stream: "Class 6-10"
    class: "7th"
    board: CBSE
  - stream: "Class 6-10"
    class: "8th"
    board: CBSE
  - stream: "Class 6-10"
    class: "9th"
    board: CBSE
  - stream: "Class 6-10"
    class: "10th"
    board: CBSE

# ---------------------------------------------------------------------------
# URLs — all are tested in guest mode.
# streams: [] (or absent) means guest-only.
# streams: [JEE] means also tested in every JEE auth session.
# A URL can belong to multiple streams: [JEE, NEET]
# ---------------------------------------------------------------------------
urls:
  # --- Home ---
  - url: https://allen.in/
    section: HOME

  # --- PLP pages ---
